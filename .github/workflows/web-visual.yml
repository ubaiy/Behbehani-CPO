name: Web visual regression

# Phase 1: manually triggerable only.
# Phase 2 will add pull_request + push triggers with diff thresholds.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'baseline | test'
        required: true
        default: 'test'

jobs:
  visual:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npm run visual:install

      - name: Start web dev server (background)
        run: npx nx serve web &

      - name: Wait for dev server to be ready
        run: npx wait-on http://localhost:4200 --timeout 60000

      - name: Run visual regression
        run: |
          if [ "${{ github.event.inputs.mode }}" = "baseline" ]; then
            npm run visual:baseline
          else
            npm run visual:test
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/web-visual/playwright-report
