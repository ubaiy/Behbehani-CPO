<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>09b — Counter offer — Behbehani Motors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { brand: {
        50:'#EFF6FF',100:'#DBEAFE',200:'#BFDBFE',300:'#93C5FD',400:'#60A5FA',
        500:'#3B82F6',600:'#2563EB',700:'#1D4ED8',800:'#1E3A8A',900:'#1E2563'
      }},
      fontFamily: { sans:['Plus Jakarta Sans','sans-serif'], arabic:['Tajawal','sans-serif'] }
    }}};
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    [dir="rtl"] body { font-family: 'Tajawal', sans-serif; }
  </style>
  <script>
    function updateCount(el) {
      document.getElementById('char-count').textContent = el.value.length;
    }
  </script>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center">

  <div class="w-[390px] min-h-[844px] bg-white shadow-2xl my-4 overflow-hidden flex flex-col relative">

    <!-- Status bar -->
    <div class="absolute top-0 inset-x-0 h-11 flex items-center justify-between px-6 pt-2 z-30 text-slate-900">
      <span class="text-[14px] font-semibold">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg viewBox="0 0 20 12" class="w-4 h-3" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="6" width="3" height="6" rx="0.5"/><rect x="10" y="3" width="3" height="9" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
        <svg viewBox="0 0 16 12" class="w-4 h-3" fill="currentColor"><path d="M8 11.5a1.25 1.25 0 100-2.5 1.25 1.25 0 000 2.5z"/></svg>
        <svg viewBox="0 0 26 12" class="w-6 h-3" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5"/><rect x="2" y="2" width="17" height="8" rx="1" fill="currentColor"/></svg>
      </div>
    </div>

    <!-- Sticky header: back + title -->
    <header class="sticky top-0 z-20 bg-white border-b border-slate-200 pt-11 px-5 pb-3 flex items-center gap-3">
      <a href="./09-offer-view.html"
         class="w-11 h-11 -ms-2 rounded-full flex items-center justify-center text-slate-700 active:bg-slate-100"
         aria-label="Back to offer">
        <svg viewBox="0 0 24 24" class="w-5 h-5 rtl:rotate-180" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <h1 class="text-[17px] font-bold text-slate-900">Counter offer</h1>
    </header>

    <!-- Scroll area -->
    <main class="flex-1 overflow-y-auto pb-36 px-5 pt-5 space-y-4">

      <!-- Original offer summary card (brand-50) -->
      <div class="rounded-2xl bg-brand-50 border border-brand-200 p-4">
        <p class="text-[11px] font-bold uppercase tracking-widest text-brand-700 mb-1">Behbehani's offer</p>
        <p class="text-[28px] font-extrabold text-brand-900 tabular-nums leading-tight">KWD 4,850.000</p>
        <p class="text-[12px] text-brand-700 mt-1">2020 Toyota Camry GLE · BMC-CON-001234</p>
      </div>

      <!-- Counter amount input -->
      <div>
        <label class="block text-[12px] font-semibold text-slate-700 mb-1.5" for="counter-amount">
          Your asking price
        </label>
        <div class="flex items-stretch rounded-xl border-2 border-slate-300 bg-white overflow-hidden focus-within:border-brand-700 transition-colors h-12">
          <span class="inline-flex items-center px-3 text-[14px] font-bold text-slate-500 bg-slate-50 border-e border-slate-200 flex-shrink-0">KWD</span>
          <input
            id="counter-amount"
            type="text"
            inputmode="decimal"
            placeholder="5,000.000"
            class="flex-1 min-w-0 px-3 text-[16px] font-bold text-slate-900 outline-none bg-white"
          >
        </div>
        <p class="text-[11px] text-slate-500 mt-1.5 ps-1">Enter an amount above KWD 4,850.000</p>
      </div>

      <!-- Notes textarea -->
      <div>
        <label class="block text-[12px] font-semibold text-slate-700 mb-1.5" for="counter-notes">
          Why this number? <span class="font-normal text-slate-400">(optional)</span>
        </label>
        <textarea
          id="counter-notes"
          rows="4"
          maxlength="500"
          oninput="updateCount(this)"
          placeholder="Why this number? · Recent service, new tires, full options..."
          class="w-full rounded-xl border border-slate-300 bg-white p-3 text-[14px] text-slate-900 outline-none focus:border-brand-700 resize-none transition-colors leading-relaxed"
        ></textarea>
        <p class="text-[11px] text-slate-400 text-end mt-1"><span id="char-count">0</span> / 500</p>
      </div>

      <!-- per ARCHITECTURE_PHASE_4_OFFER.md §16 D1: unlimited counter-offers; neutral copy only -->
      <!-- CRITICAL: No "1 round only" / "once" / "One counter" chips — D1 override binding -->
      <div class="rounded-xl bg-slate-50 border border-slate-200 p-4 flex items-start gap-3">
        <svg viewBox="0 0 24 24" class="w-5 h-5 text-brand-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <p class="text-[13px] text-slate-600 leading-relaxed">
          BMC will review and respond within <span class="font-semibold text-slate-800">24 hours</span>.
        </p>
      </div>

    </main>

    <!-- Sticky bottom: Cancel + Send counter -->
    <footer class="absolute bottom-0 inset-x-0 bg-white border-t border-slate-200 px-5 pt-4 pb-8 z-20 flex gap-3">
      <a href="./09-offer-view.html"
         class="flex items-center justify-center h-12 px-5 rounded-xl border border-slate-300 text-slate-700 font-semibold text-[14px] active:bg-slate-50 flex-shrink-0">
        Cancel
      </a>
      <button type="button"
              class="flex-1 flex items-center justify-center h-12 rounded-xl bg-brand-700 text-white font-bold text-[14px] active:bg-brand-800 shadow-sm">
        Send counter
      </button>
    </footer>

  </div>
</body>
</html>
