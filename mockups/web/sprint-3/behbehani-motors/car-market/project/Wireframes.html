<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Behbehani Motors — Wireframe Exploration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Architects+Daughter&display=swap" rel="stylesheet">

<style>
  html,body{margin:0;padding:0;font-family:"Kalam","Caveat",cursive;background:#efece4;color:#1a1a1a;overflow:hidden}
  *{box-sizing:border-box}

  /* Wireframe primitives — shared by every screen */
  :root{
    --ink:#1a1a1a;
    --ink-2:#3a3a3a;
    --muted:#6b6b6b;
    --light:#b8b8b3;
    --paper:#fdfcf8;
    --paper-2:#f6f4ec;
    --royal:#1E3A8A;
    --royal-2:#2746a6;
    --royal-light:#3B82F6;
    --royal-pale:#DCE6FA;
    --accent-on:1;     /* toggled via tweak */
    --annot-on:1;
    --density:1;       /* 1 regular, 0.85 compact, 1.15 airy */
    --sketch:1;        /* 1 sketchy, 0 clean */
  }
  body.accent-off{--royal:#222;--royal-2:#222;--royal-light:#555;--royal-pale:#eee}
  body.annot-off .annot{display:none !important}

  /* Hand-drawn font scale */
  .h-hand{font-family:"Kalam","Caveat",cursive}
  .h-hand-bold{font-family:"Kalam","Caveat",cursive;font-weight:700}
  .h-arch{font-family:"Architects Daughter","Kalam",cursive}
  .h-ui{font-family:"Inter",system-ui,sans-serif}

  /* Boxes — every wireframe element is one of these */
  .wf-box{
    border:1.5px solid var(--ink);
    background:var(--paper);
    border-radius:6px;
    position:relative;
  }
  .wf-box.thin{border-width:1px}
  .wf-box.thick{border-width:2px}
  .wf-box.dashed{border-style:dashed}
  .wf-box.muted{border-color:var(--muted);color:var(--muted)}
  .wf-box.light{border-color:var(--light)}
  .wf-box.fill-ink{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wf-box.fill-royal{background:var(--royal);color:#fff;border-color:var(--royal)}
  .wf-box.fill-pale{background:var(--royal-pale);border-color:var(--royal)}
  .wf-box.fill-paper-2{background:var(--paper-2)}
  .wf-box.accent{border-color:var(--royal);color:var(--royal)}
  .wf-box.accent-2{border-color:var(--royal);background:var(--royal-pale)}

  /* Hand-drawn rough effect — applied to specific boxes when sketch=1 */
  body.sketch-1 .rough{
    border-radius:8px 5px 7px 6px;
    transform:rotate(-0.15deg);
  }
  body.sketch-1 .rough:nth-child(2n){border-radius:5px 8px 5px 9px;transform:rotate(0.18deg)}
  body.sketch-1 .rough:nth-child(3n){border-radius:7px 6px 9px 5px;transform:rotate(-0.1deg)}

  /* Photo / image placeholder */
  .wf-img{
    background:
      repeating-linear-gradient(135deg, transparent 0 12px, rgba(0,0,0,.05) 12px 13px),
      linear-gradient(135deg,#dad7cf 0%,#cfccc3 100%);
    border:1.5px solid var(--ink);
    position:relative;
    display:flex;align-items:center;justify-content:center;
    color:#7a766c;font-family:"Kalam",cursive;
  }
  .wf-img::before{
    content:"";position:absolute;inset:6px;
    background:
      linear-gradient(45deg, transparent calc(50% - 1px), #8c887f 50%, transparent calc(50% + 1px)),
      linear-gradient(-45deg, transparent calc(50% - 1px), #8c887f 50%, transparent calc(50% + 1px));
    opacity:.35;pointer-events:none;
  }
  .wf-img > *{position:relative;z-index:1}

  /* Photo with little car silhouette */
  .wf-img.car::after{
    content:"";position:absolute;left:18%;right:18%;bottom:18%;top:30%;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80' fill='none' stroke='%237a766c' stroke-width='2'><path d='M10 60 Q15 55 25 55 L40 35 Q50 28 70 28 L120 28 Q140 28 155 38 L175 50 Q188 52 190 60 L190 65 L10 65 Z'/><circle cx='55' cy='65' r='10'/><circle cx='150' cy='65' r='10'/><circle cx='55' cy='65' r='4'/><circle cx='150' cy='65' r='4'/></svg>") center/contain no-repeat;
    opacity:.55;
  }

  /* Text squiggles for "lorem-like" content lines */
  .wf-line{
    height:6px;background:#cfcbc0;border-radius:3px;display:block;
  }
  .wf-line.short{width:40%}
  .wf-line.mid{width:65%}
  .wf-line.long{width:90%}
  .wf-line.full{width:100%}
  .wf-line.dark{background:#8c887f}
  .wf-line.thick{height:9px}

  /* Annotation labels with arrows */
  .annot{
    position:absolute;font-family:"Caveat",cursive;color:var(--royal);
    font-size:15px;line-height:1.15;font-weight:500;pointer-events:none;
    text-shadow:0 0 6px rgba(253,252,248,.9), 0 0 12px rgba(253,252,248,.7);
  }
  .annot.muted{color:#7a766c}
  .annot svg{overflow:visible}

  /* Buttons */
  .wf-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:1.5px solid var(--ink);border-radius:6px;padding:6px 12px;
    background:var(--paper);font-family:"Kalam",cursive;font-size:13px;
    white-space:nowrap;
  }
  .wf-btn.primary{background:var(--royal);color:#fff;border-color:var(--royal)}
  .wf-btn.ghost{background:transparent}
  .wf-btn.big{padding:10px 18px;font-size:15px;font-weight:700}
  .wf-btn.icon{padding:6px 8px}

  /* Pills / chips */
  .wf-chip{
    display:inline-flex;align-items:center;gap:4px;
    border:1px solid var(--ink);border-radius:999px;padding:3px 10px;
    background:var(--paper);font-family:"Kalam",cursive;font-size:12px;
  }
  .wf-chip.accent{border-color:var(--royal);color:var(--royal);background:#fff}
  .wf-chip.fill{background:var(--ink);color:#fff}

  /* Browser chrome */
  .browser{
    border:1.5px solid var(--ink);border-radius:10px;
    background:var(--paper);overflow:hidden;
    box-shadow:0 6px 22px rgba(0,0,0,.08);
  }
  .browser-bar{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;border-bottom:1.5px solid var(--ink);
    background:#e6e3da;font-family:"Kalam",cursive;font-size:12px;
  }
  .browser-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ink);background:#fff}
  .browser-url{flex:1;border:1.5px solid var(--ink);border-radius:6px;background:#fff;padding:3px 10px;font-size:12px;color:#3a3a3a}

  /* Phone chrome (mobile companions) */
  .phone{
    border:2px solid var(--ink);border-radius:32px;background:var(--paper);
    overflow:hidden;padding:8px 6px;position:relative;
    box-shadow:0 8px 28px rgba(0,0,0,.12);
  }
  .phone::before{
    content:"";position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:60px;height:8px;border:1.5px solid var(--ink);border-radius:99px;background:#1a1a1a;
  }
  .phone-screen{
    border:1.5px solid var(--ink);border-radius:24px;background:#fff;
    margin-top:24px;height:calc(100% - 28px);overflow:hidden;
  }

  /* Sticky badge */
  .wf-badge{
    display:inline-block;border:1.5px solid var(--ink);
    background:#fff352;padding:2px 8px;border-radius:4px;
    font-family:"Caveat",cursive;font-weight:600;font-size:13px;
    transform:rotate(-2deg);
  }
  .wf-badge.royal{background:var(--royal);color:#fff;border-color:var(--royal)}

  /* Scrollable content area inside an artboard */
  .scroller{height:100%;overflow:auto}
  .scroller::-webkit-scrollbar{display:none}

  /* Sketchy underline via SVG bg */
  .underline{
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 6' preserveAspectRatio='none'><path d='M2 4 Q 20 1 40 3 T 80 3 T 98 3' stroke='%231E3A8A' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>") bottom/100% 5px no-repeat;
    padding-bottom:6px;
  }

  /* Star (used for inspection ratings, reviews) */
  .wf-star{display:inline-block;width:14px;height:14px;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231a1a1a'><path d='M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z'/></svg>") center/contain no-repeat;
    vertical-align:middle;
  }

  /* Stepper dots */
  .wf-step{
    display:inline-flex;align-items:center;gap:6px;font-family:"Kalam",cursive;font-size:12px;
  }
  .wf-step .dot{
    width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);
    background:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:11px;
  }
  .wf-step.active .dot{background:var(--royal);color:#fff;border-color:var(--royal)}
  .wf-step.done .dot{background:var(--ink);color:#fff}

  /* RTL mirror — applied at the artboard level for AR variants */
  .rtl-mirror{direction:rtl}
  .rtl-mirror .annot{direction:ltr}

  /* Section divider squiggle */
  .squiggle{
    height:8px;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 8' preserveAspectRatio='none'><path d='M0 4 Q 12.5 0 25 4 T 50 4 T 75 4 T 100 4' stroke='%231a1a1a' stroke-width='1.5' fill='none'/></svg>") center/100% 8px repeat-x;
    opacity:.5;
  }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/design-canvas.jsx"></script>
<script type="text/babel" src="lib/tweaks-panel.jsx"></script>
<script type="text/babel" src="lib/wf-base.jsx"></script>
<script type="text/babel" src="lib/wf-home.jsx"></script>
<script type="text/babel" src="lib/wf-listings.jsx"></script>
<script type="text/babel" src="lib/wf-vdp.jsx"></script>
<script type="text/babel" src="lib/wf-checkout.jsx"></script>
<script type="text/babel" src="lib/wf-sell.jsx"></script>
<script type="text/babel" src="lib/wf-finance.jsx"></script>
<script type="text/babel" src="lib/wf-fulfillment.jsx"></script>
</head>
<body class="sketch-1">

<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sketch":1,
  "accent":1,
  "annot":1,
  "density":1,
  "rtl":0
}/*EDITMODE-END*/;

function App(){
  const [t,setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to body classes / vars
  React.useEffect(()=>{
    document.body.classList.toggle('sketch-1', !!t.sketch);
    document.body.classList.toggle('accent-off', !t.accent);
    document.body.classList.toggle('annot-off', !t.annot);
    document.documentElement.style.setProperty('--density', t.density);
  },[t]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="intro" title="Behbehani Motors — Wireframe Exploration"
          subtitle="Low-fi sketches of the consumer marketplace. 8 screen groups · ~25 variations. Drag to reorder · click any card to focus.">
          <DCArtboard id="cover" label="Cover · Brief & legend" width={760} height={520}>
            <CoverArtboard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="home" title="01 · Home / Landing"
          subtitle="The front door. 4 directions, each making a different first promise to the visitor.">
          <DCArtboard id="home-classic"  label="A · Classic marketplace"    width={1200} height={1500}><HomeClassic/></DCArtboard>
          <DCArtboard id="home-dual"     label="B · Buy + Sell dual hero"   width={1200} height={1500}><HomeDual/></DCArtboard>
          <DCArtboard id="home-edit"     label="C · Editorial / premium"    width={1200} height={1500}><HomeEditorial/></DCArtboard>
          <DCArtboard id="home-search"   label="D · Search-first dense"     width={1200} height={1500}><HomeSearchFirst/></DCArtboard>
          <DCArtboard id="home-rtl"      label="E · Arabic / RTL mirror (of A)" width={1200} height={1500}><HomeClassic rtl/></DCArtboard>
        </DCSection>

        <DCSection id="listings" title="02 · Browse / Filter"
          subtitle="Where most discovery happens. Filter affordances differ wildly — exploring 4.">
          <DCArtboard id="list-sidebar" label="A · Sidebar filters + grid"  width={1200} height={1400}><ListSidebar/></DCArtboard>
          <DCArtboard id="list-chips"   label="B · Top chip filters"        width={1200} height={1400}><ListChips/></DCArtboard>
          <DCArtboard id="list-map"     label="C · Map split + drawer"      width={1200} height={1400}><ListMap/></DCArtboard>
          <DCArtboard id="list-monthly" label="D · Monthly-payment first"   width={1200} height={1400}><ListMonthly/></DCArtboard>
        </DCSection>

        <DCSection id="vdp" title="03 · Vehicle Detail Page"
          subtitle="Conversion surface. Inspection report is the trust anchor — how prominent should it be?">
          <DCArtboard id="vdp-gallery"   label="A · Gallery hero, scroll"    width={1200} height={1800}><VdpGallery/></DCArtboard>
          <DCArtboard id="vdp-sticky"    label="B · Sticky price rail"       width={1200} height={1800}><VdpSticky/></DCArtboard>
          <DCArtboard id="vdp-inspect"   label="C · Inspection-first"        width={1200} height={1800}><VdpInspection/></DCArtboard>
          <DCArtboard id="vdp-mobile"    label="D · Mobile companion"        width={400}  height={820}><VdpMobile/></DCArtboard>
        </DCSection>

        <DCSection id="reserve" title="04 · Reserve + 7-step purchase wizard"
          subtitle="KWD 100 deposit → 48-hr hold → 7 steps to delivery. Stepper placement is the key choice.">
          <DCArtboard id="res-vstep"   label="A · Vertical stepper"          width={1200} height={1300}><ReserveVerticalStep/></DCArtboard>
          <DCArtboard id="res-hstep"   label="B · Horizontal stepper"        width={1200} height={1300}><ReserveHorizontalStep/></DCArtboard>
          <DCArtboard id="res-split"   label="C · Split: car always visible" width={1200} height={1300}><ReserveSplit/></DCArtboard>
        </DCSection>

        <DCSection id="sell" title="05 · Sell — Instant Online Valuation"
          subtitle="The 'wow' entry to selling. Three takes on the same question: what does the seller see first?">
          <DCArtboard id="sell-linear" label="A · Linear form"               width={1200} height={1300}><SellLinear/></DCArtboard>
          <DCArtboard id="sell-chat"   label="B · Conversational"            width={1200} height={1300}><SellChat/></DCArtboard>
          <DCArtboard id="sell-photo"  label="C · Photo-first AI valuation"  width={1200} height={1300}><SellPhoto/></DCArtboard>
        </DCSection>

        <DCSection id="finance" title="06 · Multi-bank financing offers"
          subtitle="Side-by-side bank offers is a major selling point. Three layouts.">
          <DCArtboard id="fin-table"   label="A · Comparison table"          width={1200} height={1200}><FinanceTable/></DCArtboard>
          <DCArtboard id="fin-cards"   label="B · Card grid + recommended"   width={1200} height={1200}><FinanceCards/></DCArtboard>
          <DCArtboard id="fin-live"    label="C · Live-update sliders"       width={1200} height={1200}><FinanceLive/></DCArtboard>
        </DCSection>

        <DCSection id="fulfill" title="07 · Delivery tracking + Returns"
          subtitle="Post-purchase trust. The 3-day / 300-km guarantee is unique — give it space.">
          <DCArtboard id="del-map"     label="A · Delivery — map dominant"   width={1200} height={1100}><DeliveryMap/></DCArtboard>
          <DCArtboard id="del-mobile"  label="B · Delivery — mobile"         width={400}  height={820}><DeliveryMobile/></DCArtboard>
          <DCArtboard id="ret-init"   label="C · Returns — initiate"        width={1200} height={1100}><ReturnsInitiate/></DCArtboard>
          <DCArtboard id="ret-track"  label="D · Returns — track refund"    width={1200} height={1100}><ReturnsTrack/></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Sketch style"/>
        <TweakToggle label="Sketch roughness"    value={!!t.sketch}  onChange={(v)=>setTweak('sketch',  v?1:0)} />
        <TweakToggle label="Royal blue accent"   value={!!t.accent}  onChange={(v)=>setTweak('accent',  v?1:0)} />
        <TweakToggle label="Show annotations"    value={!!t.annot}   onChange={(v)=>setTweak('annot',   v?1:0)} />
        <TweakSection label="Density"/>
        <TweakRadio label="Density" value={String(t.density)}
          options={['0.9','1','1.1']}
          onChange={(v)=>setTweak('density', parseFloat(v))} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
