<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behbehani CPO · Back Office — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="h-full bg-slate-100 font-sans antialiased">

  <!-- Full-page centering wrapper -->
  <div class="min-h-full flex flex-col items-center justify-center py-12 px-4">

    <!-- Sign-in card -->
    <div class="w-full max-w-sm bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">

      <!-- Card header -->
      <div class="px-8 pt-8 pb-6 border-b border-slate-100">
        <!-- Brand mark -->
        <div class="flex items-center gap-2.5 mb-5">
          <!-- Logo mark: stylised "B" shield -->
          <div class="w-9 h-9 rounded-lg bg-brand-600 flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-white" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10 1.5L3 4.5v5c0 4.14 2.97 8.01 7 8.96 4.03-.95 7-4.82 7-8.96v-5L10 1.5zm-1 10.5H7V6h2v6zm2 0h-1V6h1a2 2 0 010 4h-1v1.5H11V12z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div>
            <p class="text-xs font-semibold tracking-widest text-brand-600 uppercase leading-none">Behbehani CPO</p>
            <p class="text-xs text-slate-400 leading-tight mt-0.5">Back Office</p>
          </div>
        </div>

        <h1 class="text-lg font-semibold text-slate-800">Administrator Sign In</h1>
        <p class="text-sm text-slate-500 mt-0.5">Authorised personnel only.</p>
      </div>

      <!-- Form body -->
      <div class="px-8 py-6">
        <form novalidate class="space-y-4">

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Work email</label>
            <input
              id="email"
              type="email"
              autocomplete="email"
              placeholder="you@behbehani.com"
              value="ops.manager@behbehani.com"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-800 placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                     bg-white"
            />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
              <a href="#" class="text-xs text-brand-600 hover:text-brand-700 font-medium">Forgot password?</a>
            </div>
            <div class="relative">
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                class="w-full rounded-md border border-slate-300 px-3 py-2 pr-10 text-sm text-slate-800 placeholder-slate-400
                       focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                       bg-white"
              />
              <!-- Show/hide toggle (visual only) -->
              <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error state (shown as example) -->
          <div class="flex items-start gap-2 rounded-md bg-red-50 border border-red-200 px-3 py-2.5 hidden" id="error-banner">
            <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <p class="text-xs text-red-700">Invalid credentials. Please try again or contact IT support.</p>
          </div>

          <!-- Remember me -->
          <div class="flex items-center gap-2">
            <input id="remember" type="checkbox" checked
              class="h-4 w-4 rounded border-slate-300 text-brand-600 focus:ring-brand-500 cursor-pointer" />
            <label for="remember" class="text-sm text-slate-600 cursor-pointer">Keep me signed in for 8 hours</label>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="w-full rounded-md bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white
                   hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2
                   transition-colors duration-150"
          >
            Sign in to Back Office
          </button>

        </form>

        <!-- Divider + SSO note -->
        <div class="mt-5 relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
          <div class="relative flex justify-center"><span class="bg-white px-3 text-xs text-slate-400">or</span></div>
        </div>

        <button
          type="button"
          class="mt-4 w-full rounded-md border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700
                 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2
                 flex items-center justify-center gap-2 transition-colors duration-150"
        >
          <!-- Microsoft icon approximation -->
          <svg class="w-4 h-4" viewBox="0 0 21 21" fill="none" aria-hidden="true">
            <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
            <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
            <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
            <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
          </svg>
          Continue with Microsoft SSO
        </button>
      </div>

    </div>

    <!-- Version / environment footer -->
    <p class="mt-6 text-center text-xs text-slate-400 select-none">
      Behbehani CPO Admin &middot; v0.1.0-sprint1 &middot; Production
    </p>
    <p class="text-center text-xs text-slate-400 mt-1">
      Need access?
      <a href="mailto:it@behbehani.com" class="text-brand-600 hover:underline">Contact IT Support</a>
    </p>

  </div>

</body>
</html>
