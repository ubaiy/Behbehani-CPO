name: cpo-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: cpo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpo
      POSTGRES_PASSWORD: cpo
      POSTGRES_DB: cpo
    ports:
      - "5432:5432"
    volumes:
      - cpo-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpo -d cpo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cpo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cpo-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cpo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cpo-local
      MINIO_ROOT_PASSWORD: cpo-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - cpo-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cpo-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  cpo-pg-data:
  cpo-redis-data:
  cpo-minio-data:
