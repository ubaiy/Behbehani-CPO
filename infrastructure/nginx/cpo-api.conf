# /etc/nginx/sites-available/cpo-api.conf
#
# Production nginx config for the Behbehani CPO API.
#
# Deploy:
#   sudo cp infrastructure/nginx/cpo-api.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/cpo-api.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: this file STARTS as port-80 only. After `certbot --nginx -d api.<your-domain>`
#      runs, certbot rewrites this file with the 443/SSL server block and adds a
#      80→443 redirect. Re-running deploy preserves certbot's edits as long as
#      you only edit the upstream `location /` block.

# Upstream — keep API on loopback only; nginx is the only public face.
upstream cpo_api_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Rate-limit zones (defense-in-depth; express-rate-limit also runs in-app)
limit_req_zone $binary_remote_addr zone=cpo_api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cpo_api_auth:10m    rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.behbehanimotors.com;   # ← change to your real domain before deploy

    # Acme challenge — Let's Encrypt uses this for cert issuance + renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Body size — JSON requests are tiny; admin presign-flow keeps the actual
    # photo/video bytes going DIRECTLY to S3 via presigned PUT (not through
    # nginx). 10 MB is plenty for JSON bodies + edge cases.
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 10s;

    # Security headers (helmet sets most, these are belt-and-braces)
    add_header X-Frame-Options          "SAMEORIGIN"          always;
    add_header X-Content-Type-Options   "nosniff"             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "interest-cohort=()"  always;

    # Tighter rate on auth endpoints (account-enumeration + brute-force defence)
    location ~ ^/v1/(auth|public/auth)/ {
        limit_req zone=cpo_api_auth burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://cpo_api_backend;
        include /etc/nginx/snippets/cpo-proxy-common.conf;
    }

    # Everything else
    location / {
        limit_req zone=cpo_api_general burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://cpo_api_backend;
        include /etc/nginx/snippets/cpo-proxy-common.conf;
    }

    # Health endpoint — no logging, no rate-limit (used by ALB / uptime monitors)
    location = /health {
        access_log off;
        proxy_pass http://cpo_api_backend;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Static demo media (v1.5.16) is served by Express directly with
    # Cache-Control: immutable, but we can layer an nginx-side cache too.
    location /static/demo-media/ {
        proxy_pass http://cpo_api_backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    # Reject anything that looks like a bot probing for WP / phpMyAdmin etc.
    location ~* \.(env|git|sql|bak|swp)$ { return 404; }
    location ~* /(\.git|\.env|wp-admin|wp-login\.php|phpmyadmin)/ { return 404; }
}

# After certbot runs, it appends a `server { listen 443 ssl; ... }` block here
# and inserts `return 301 https://...` in the port-80 block above. Don't edit
# certbot's additions by hand — re-run `sudo certbot --nginx` if you need to
# regenerate.
