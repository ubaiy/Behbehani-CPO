# /etc/nginx/snippets/cpo-proxy-common.conf
#
# Shared proxy headers for all cpo-api.conf locations.
# Included via `include /etc/nginx/snippets/cpo-proxy-common.conf;`

proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Forward real client IP so express-rate-limit + audit-log capture the right
# address. The API has `app.set('trust proxy', 1)` to honour these headers.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

proxy_cache_bypass $http_upgrade;
proxy_redirect off;

# Timeouts — Node's default keep-alive is 5s; nginx upstream keepalive must be
# shorter to avoid socket-reuse race that yields 502s on long-idle connections.
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Buffer settings — most responses are < 8 KB JSON; bigger PDFs (sale_contract
# v1.4 / receipt) stream from the worker.
proxy_buffering    on;
proxy_buffer_size  16k;
proxy_buffers      8 16k;
